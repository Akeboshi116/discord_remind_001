# ワークフロー名
name: 3限開始10分前

# 実行条件
on:

  schedule:

    # 毎日13:10(JST)
    - cron: "10 4 * * *"

  # 手動実行を有効化
  workflow_dispatch:

jobs:

  reminder:

    runs-on: ubuntu-latest

    steps:

      # リポジトリ取得
      - uses: actions/checkout@v4

      # Pythonをセットアップ
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 必要なライブラリをインストール
      - run: pip install -r requirements.txt

      # 通知を送信
      - run: python main.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MESSAGE: "3限開始10分前"
