name: Discord Reminder

on:
  schedule:
    # 毎日18:00（日本時間）
    - cron: "0 9 * * *"

  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ライブラリをインストール
        run: pip install -r requirements.txt

      - name: リマインダーを実行
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py
